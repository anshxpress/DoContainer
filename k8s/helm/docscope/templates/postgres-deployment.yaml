apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "docscope.fullname" . }}-postgres-pvc
  labels:
    {{- include "docscope.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "docscope.fullname" . }}-postgres
  labels:
    {{- include "docscope.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.postgres.ports.port }}
      targetPort: 5432
  selector:
    {{- include "docscope.selectorLabels" . | nindent 4 }}
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docscope.fullname" . }}-postgres
  labels:
    {{- include "docscope.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "docscope.selectorLabels" . | nindent 6 }}
      app: postgres
  template:
    metadata:
      labels:
        {{- include "docscope.selectorLabels" . | nindent 8 }}
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: {{ .Values.config.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.config.dbUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "docscope.fullname" . }}-secrets
                  key: postgres-password
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: {{ include "docscope.fullname" . }}-postgres-pvc

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docscope.fullname" . }}-worker
  labels:
    {{- include "docscope.labels" . | nindent 4 }}
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "docscope.selectorLabels" . | nindent 6 }}
      app: worker
  template:
    metadata:
      labels:
        {{- include "docscope.selectorLabels" . | nindent 8 }}
        app: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: ["celery", "-A", "backend.app.tasks.celery_app", "worker", "--loglevel=info", "-Q", "celery,ingestion-dlq"]
          env:
            - name: DB_USER
              value: {{ .Values.config.dbUser | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "docscope.fullname" . }}-secrets
                  key: postgres-password
            - name: DB_HOST
              value: {{ include "docscope.fullname" . }}-postgres
            - name: DB_NAME
              value: {{ .Values.config.dbName | quote }}
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"
            - name: S3_ENDPOINT_URL
              value: {{ .Values.config.s3Endpoint | quote }}
            - name: S3_BUCKET_NAME
              value: {{ .Values.config.s3Bucket | quote }}
            - name: AWS_ACCESS_KEY_ID
              value: "minioadmin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minioadmin"
            - name: AWS_REGION
              value: "us-east-1"
            - name: CELERY_BROKER_URL
              value: "redis://{{ include "docscope.fullname" . }}-redis:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://{{ include "docscope.fullname" . }}-redis:6379/0"
            - name: QDRANT_URL
              value: "http://{{ include "docscope.fullname" . }}-qdrant:6333"
            - name: CLAMAV_HOST
              value: "localhost"
            - name: CLAMAV_PORT
              value: "3310"
            - name: LLM_PROVIDER
              value: {{ .Values.config.llmProvider | quote }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "docscope.fullname" . }}-secrets
                  key: gemini-api-key
            - name: GEMINI_MODEL
              value: {{ .Values.config.geminiModel | quote }}
            - name: RSA_PUBLIC_KEY_PATH
              value: "certs/public_key.pem"
            - name: RSA_PRIVATE_KEY_PATH
              value: "certs/private_key.pem"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}

# Default values for docscope.

global:
  environment: production
  orgName: "docscope-enterprise"

api:
  replicaCount: 2
  image:
    repository: docscope-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8001
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi

worker:
  replicaCount: 1
  image:
    repository: docscope-worker
    tag: latest
    pullPolicy: IfNotPresent
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetQueueLength: 50 # scale up when celery default queue has more than 50 tasks
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
      nvidia.com/gpu: "1" # requests GPU resource for embeddings/OCR
    requests:
      cpu: 500m
      memory: 1Gi
      nvidia.com/gpu: "1"

frontend:
  replicaCount: 2
  image:
    repository: docscope-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

postgres:
  image: postgres:16-alpine
  ports:
    port: 5432
  persistence:
    size: 20Gi

qdrant:
  image: qdrant/qdrant:v1.10.1
  ports:
    port: 6333
  persistence:
    size: 10Gi

redis:
  image: redis:7-alpine
  ports:
    port: 6379

config:
  dbHost: "postgres"
  dbUser: "postgres"
  dbPassword: "postgrespassword"
  dbName: "docscope"
  s3Endpoint: "http://minio:9000"
  s3Bucket: "docscope-storage"
  llmProvider: "gemini"
  geminiApiKey: "YOUR_GEMINI_API_KEY_HERE"
  geminiModel: "gemini-1.5-flash"

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: docscope-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docscope
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docscope-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: docscope-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  clamav:
    image: clamav/clamav:latest
    container_name: docscope-clamav
    restart: always
    profiles:
      - security
    ports:
      - "3310:3310"

  minio:
    image: minio/minio:latest
    container_name: docscope-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  worker-ocr:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: docscope-worker-ocr
    command: celery -A backend.app.tasks.celery_app worker -l info -Q ocr-pipeline --concurrency=1
    restart: unless-stopped
    profiles:
      - ai
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/docscope
      - QDRANT_URL=http://qdrant:6333
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=docscope-documents
      - OCR_PROVIDER=PaddleOCR
      - GPU_ENABLED=true
      - HF_HOME=/models
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - paddle_cache:/root/.paddleocr
      - ai_models:/models
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g
    healthcheck:
      test: ["CMD", "python", "-c", "print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-embed:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: docscope-worker-embed
    command: celery -A backend.app.tasks.celery_app worker -l info -Q embed-pipeline --concurrency=1
    restart: unless-stopped
    profiles:
      - ai
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/docscope
      - QDRANT_URL=http://qdrant:6333
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=docscope-documents
      - TEXT_EMBEDDING_MODEL=BAAI/bge-m3
      - GPU_ENABLED=true
      - HF_HOME=/models
      - BGE_WORKER_MODE=1
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ai_models:/models
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-metadata:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: docscope-worker-metadata
    command: celery -A backend.app.tasks.celery_app worker -l info -Q metadata-pipeline --concurrency=2
    restart: unless-stopped
    profiles:
      - ai
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/docscope
      - QDRANT_URL=http://qdrant:6333
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=docscope-documents
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: docscope-prometheus
    restart: always
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: docscope-grafana
    restart: always
    profiles:
      - monitoring
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  huggingface_cache:
  paddle_cache:
  ai_models:
  prometheus_data:
  grafana_data:
